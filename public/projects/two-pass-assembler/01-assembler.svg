    <text x="1284" y="390" fill="#6ab0f5">[PASS 2]</text>
    <text x="1352" y="390" fill="#aaa"> Encoding instructions</text>
    <text x="1284" y="412" fill="#aaa">  Resolving externals: W</text>
    <text x="1284" y="434" fill="#aaa">  Encoding: 16 instructions</text>
    <text x="1284" y="456" fill="#aaa">  Data words: 5</text>
    <text x="1284" y="478" fill="#5a8a5a">  ✓ Pass 2 done (0 errors)</text>

    <text x="1284" y="506" fill="#555">────────────────────────────</text>

    <text x="1284" y="534" fill="#c8a96e">[OUTPUT]</text>
    <text x="1284" y="556" fill="#5a8a5a">  → example.ob</text>
    <text x="1284" y="578" fill="#aaa">      16 code words</text>
