  <text x="1020" y="612" font-size="11" fill="#e23614" letter-spacing="0.15em">SRC</text>
  <line x1="660" y1="620" x2="1220" y2="620" stroke="#1e1e1e" stroke-width="1"/>

  <g font-size="13">
    <rect x="660" y="620" width="560" height="22" fill="#131313"/>
    <text x="686" y="636" fill="#555">0000</text>
    <text x="760" y="636" fill="#c8a96e">0000 3110 2030</text>
    <text x="1020" y="636" fill="#5a8a5a">mov r3,LIST</text>

    <rect x="660" y="642" width="560" height="22" fill="#141414"/>
    <text x="686" y="658" fill="#555">0003</text>
    <text x="760" y="658" fill="#c8a96e">0000 2110 1030</text>
    <text x="1020" y="658" fill="#5a8a5a">mov r1,LEN</text>

    <rect x="660" y="664" width="560" height="22" fill="#131313"/>
    <text x="686" y="680" fill="#555">0006</text>
    <text x="760" y="680" fill="#c8a96e">0000 1110 0000</text>
    <text x="1020" y="680" fill="#5a8a5a">cmp r1,#0</text>

    <rect x="660" y="686" width="560" height="22" fill="#141414"/>
    <text x="686" y="702" fill="#555">0008</text>
    <text x="760" y="702" fill="#c8a96e">0000 3200 3200</text>
    <text x="1020" y="702" fill="#5a8a5a">blt END</text>

    <rect x="660" y="708" width="560" height="22" fill="#131313"/>
    <text x="686" y="724" fill="#555">0010</text>
    <text x="760" y="724" fill="#c8a96e">0000 2301 0030</text>
    <text x="1020" y="724" fill="#5a8a5a">add r3,W</text>

    <rect x="660" y="730" width="560" height="22" fill="#141414"/>
    <text x="686" y="746" fill="#555">0012</text>
    <text x="760" y="746" fill="#c8a96e">0000 1110 3111</text>
    <text x="1020" y="746" fill="#5a8a5a">sub r1,#1</text>

    <rect x="660" y="752" width="560" height="22" fill="#131313"/>
    <text x="686" y="768" fill="#555">0014</text>
    <text x="760" y="768" fill="#c8a96e">0000 1000 0600</text>
    <text x="1020" y="768" fill="#5a8a5a">jmp LOOP</text>

    <rect x="660" y="774" width="560" height="22" fill="#141414"/>
    <text x="686" y="790" fill="#555">0016</text>
    <text x="760" y="790" fill="#c8a96e">0000 0000 1111</text>
    <text x="1020" y="790" fill="#5a8a5a">hlt</text>

    <!-- data segment -->
    <rect x="660" y="796" width="560" height="18" fill="#0d0d0d"/>
    <text x="686" y="810" font-size="11" fill="#333" letter-spacing="0.1em">─── DATA SEGMENT ──────────────────────────────</text>

    <rect x="660" y="814" width="560" height="22" fill="#131313"/>
    <text x="686" y="830" fill="#555">0100</text>
    <text x="760" y="830" fill="#6ab0f5">0000 0000 0012</text>
    <text x="1020" y="830" fill="#5a8a5a">6</text>

    <rect x="660" y="836" width="560" height="22" fill="#141414"/>
    <text x="686" y="852" fill="#555">0101</text>
    <text x="760" y="852" fill="#6ab0f5">3333 3333 3321</text>
    <text x="1020" y="852" fill="#5a8a5a">-9</text>

    <rect x="660" y="858" width="560" height="22" fill="#131313"/>
    <text x="686" y="874" fill="#555">0102</text>
    <text x="760" y="874" fill="#6ab0f5">0000 0000 0033</text>
    <text x="1020" y="874" fill="#5a8a5a">15</text>

    <rect x="660" y="880" width="560" height="22" fill="#141414"/>
    <text x="686" y="896" fill="#555">0103</text>
    <text x="760" y="896" fill="#6ab0f5">3333 3333 3331</text>
    <text x="1020" y="896" fill="#5a8a5a">-3</text>
  </g>

  <!-- Right panel — terminal output -->
  <rect x="1260" y="80" width="579" height="919" rx="4" fill="#0c0c0c" stroke="#1e1e1e" stroke-width="1"/>
  <rect x="1260" y="80" width="579" height="36" rx="4" fill="#151515"/>
  <rect x="1260" y="104" width="579" height="12" fill="#151515"/>
  <circle cx="1288" cy="98" r="6" fill="#3a1a1a"/>
  <circle cx="1310" cy="98" r="6" fill="#3a3018"/>
  <circle cx="1332" cy="98" r="6" fill="#1a3a1a"/>
  <text x="1550" y="102" text-anchor="middle" font-size="11" fill="#555" letter-spacing="0.1em">bash — assembler</text>

  <g font-size="13">
    <text x="1284" y="146" fill="#5a8a5a">$ </text>
    <text x="1304" y="146" fill="#aaa">./assembler example</text>

    <text x="1284" y="174" fill="#555">Assembler v2.0 · ANSI C90</text>
    <text x="1284" y="196" fill="#555">────────────────────────────</text>

    <text x="1284" y="224" fill="#6ab0f5">[PASS 1]</text>
    <text x="1352" y="224" fill="#aaa"> Building symbol table</text>
