<svg xmlns="http://www.w3.org/2000/svg" width="1919" height="1079" viewBox="0 0 1919 1079">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Courier New', monospace; }
