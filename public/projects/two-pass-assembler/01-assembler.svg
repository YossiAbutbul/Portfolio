  <text x="960" y="134" font-size="11" fill="#e23614" letter-spacing="0.15em">TYPE</text>
  <text x="1080" y="134" font-size="11" fill="#e23614" letter-spacing="0.15em">ATTR</text>
  <line x1="660" y1="144" x2="1220" y2="144" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Table rows -->
  <g font-size="13">
    <rect x="660" y="144" width="560" height="24" fill="#131313"/>
    <text x="686" y="161" fill="#6ab0f5">MAIN</text>
    <text x="840" y="161" fill="#ffffff">0</text>
    <text x="960" y="161" fill="#c8a96e">code</text>
    <text x="1080" y="161" fill="#5a8a5a">entry</text>

    <rect x="660" y="168" width="560" height="24" fill="#141414"/>
    <text x="686" y="185" fill="#6ab0f5">LOOP</text>
    <text x="840" y="185" fill="#ffffff">6</text>
    <text x="960" y="185" fill="#c8a96e">code</text>
    <text x="1080" y="185" fill="#5a8a5a">entry</text>

    <rect x="660" y="192" width="560" height="24" fill="#131313"/>
    <text x="686" y="209" fill="#6ab0f5">END</text>
    <text x="840" y="209" fill="#ffffff">14</text>
    <text x="960" y="209" fill="#c8a96e">code</text>
    <text x="1080" y="209" fill="#aaa">local</text>

    <rect x="660" y="216" width="560" height="24" fill="#141414"/>
    <text x="686" y="233" fill="#6ab0f5">LIST</text>
    <text x="840" y="233" fill="#ffffff">256</text>
    <text x="960" y="233" fill="#c8a96e">data</text>
    <text x="1080" y="233" fill="#aaa">local</text>

    <rect x="660" y="240" width="560" height="24" fill="#131313"/>
    <text x="686" y="257" fill="#6ab0f5">W</text>
    <text x="840" y="257" fill="#555">—</text>
    <text x="960" y="257" fill="#c8a96e">code</text>
    <text x="1080" y="257" fill="#e23614">extern</text>

    <rect x="660" y="264" width="560" height="24" fill="#141414"/>
    <text x="686" y="281" fill="#c8a96e">LEN</text>
    <text x="840" y="281" fill="#ffffff">4</text>
    <text x="960" y="281" fill="#aaa">mdefine</text>
    <text x="1080" y="281" fill="#aaa">—</text>

    <rect x="660" y="288" width="560" height="24" fill="#131313"/>
    <text x="686" y="305" fill="#c8a96e">SZ</text>
    <text x="840" y="305" fill="#ffffff">8</text>
    <text x="960" y="305" fill="#aaa">mdefine</text>
    <text x="1080" y="305" fill="#aaa">—</text>
  </g>

