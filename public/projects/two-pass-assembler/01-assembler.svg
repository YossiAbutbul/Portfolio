  <circle cx="152" cy="98" r="6" fill="#3a3a3a"/>
  <text x="280" y="102" text-anchor="middle" font-size="11" fill="#555" letter-spacing="0.1em">example.as</text>

  <!-- Source code lines -->
  <!-- Line numbers -->
  <g fill="#333" font-size="13">
    <text x="106" y="158">1</text>
    <text x="106" y="180">2</text>
    <text x="106" y="202">3</text>
    <text x="106" y="224">4</text>
    <text x="106" y="246">5</text>
    <text x="106" y="268">6</text>
    <text x="106" y="290">7</text>
    <text x="106" y="312">8</text>
    <text x="106" y="334">9</text>
    <text x="99" y="356">10</text>
    <text x="99" y="378">11</text>
    <text x="99" y="400">12</text>
    <text x="99" y="422">13</text>
    <text x="99" y="444">14</text>
    <text x="99" y="466">15</text>
    <text x="99" y="488">16</text>
    <text x="99" y="510">17</text>
    <text x="99" y="532">18</text>
    <text x="99" y="554">19</text>
    <text x="99" y="576">20</text>
    <text x="99" y="598">21</text>
    <text x="99" y="620">22</text>
    <text x="99" y="642">23</text>
    <text x="99" y="664">24</text>
    <text x="99" y="686">25</text>
  </g>

  <!-- Divider between line numbers and code -->
  <line x1="128" y1="118" x2="128" y2="980" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Source code text -->
  <g font-size="13" fill="#5a8a5a">
    <text x="142" y="158">; Two-Pass Assembler — example.as</text>
    <text x="142" y="180">; ANSI C90 · base-4 machine code</text>
  </g>
  <text x="142" y="202" font-size="13" fill="#1e1e1e">&#160;</text>

  <g font-size="13">
    <!-- .define -->
    <text x="142" y="224" fill="#e23614">.define</text>
    <text x="222" y="224" fill="#c8a96e"> LEN</text>
    <text x="262" y="224" fill="#ffffff"> 4</text>

    <text x="142" y="246" fill="#e23614">.define</text>
    <text x="222" y="246" fill="#c8a96e"> SZ</text>
    <text x="255" y="246" fill="#ffffff"> 8</text>

    <text x="142" y="268" fill="#555">&#160;</text>

    <!-- .entry / .extern -->
    <text x="142" y="290" fill="#e23614">.entry</text>
    <text x="210" y="290" fill="#c8a96e"> LOOP</text>
    <text x="142" y="312" fill="#e23614">.extern</text>
    <text x="220" y="312" fill="#c8a96e"> W</text>

    <text x="142" y="334" fill="#555">&#160;</text>

    <!-- MAIN label -->
    <text x="142" y="356" fill="#6ab0f5">MAIN</text>
    <text x="183" y="356" fill="#aaa">:</text>
    <text x="142" y="378" fill="#c8a96e">        mov</text>
    <text x="220" y="378" fill="#ffffff"> r3, </text>
    <text x="254" y="378" fill="#c8a96e">LIST</text>

    <text x="142" y="400" fill="#c8a96e">        mov</text>
    <text x="220" y="400" fill="#ffffff"> r1, </text>
    <text x="254" y="400" fill="#c8a96e">LEN</text>

    <text x="142" y="422" fill="#555">&#160;</text>

    <!-- LOOP label -->
    <text x="142" y="444" fill="#6ab0f5">LOOP</text>
    <text x="183" y="444" fill="#aaa">:</text>
    <text x="142" y="466" fill="#c8a96e">        cmp</text>
    <text x="220" y="466" fill="#ffffff"> r1, </text>
    <text x="254" y="466" fill="#ffffff">#0</text>

    <text x="142" y="488" fill="#c8a96e">        blt</text>
    <text x="220" y="488" fill="#6ab0f5"> END</text>

    <text x="142" y="510" fill="#c8a96e">        add</text>
    <text x="220" y="510" fill="#ffffff"> r3, </text>
    <text x="254" y="510" fill="#c8a96e">W</text>

    <text x="142" y="532" fill="#c8a96e">        sub</text>
    <text x="220" y="532" fill="#ffffff"> r1, </text>
    <text x="254" y="532" fill="#ffffff">#1</text>

    <text x="142" y="554" fill="#c8a96e">        jmp</text>
    <text x="220" y="554" fill="#6ab0f5"> LOOP</text>

    <text x="142" y="576" fill="#555">&#160;</text>

    <!-- END label -->
    <text x="142" y="598" fill="#6ab0f5">END</text>
    <text x="172" y="598" fill="#aaa">:</text>
    <text x="142" y="620" fill="#c8a96e">        hlt</text>

    <text x="142" y="642" fill="#555">&#160;</text>

    <!-- .data -->
    <text x="142" y="664" fill="#6ab0f5">LIST</text>
    <text x="183" y="664" fill="#aaa">:</text>
    <text x="142" y="686" fill="#e23614">        .data</text>
    <text x="220" y="686" fill="#ffffff"> 6,</text>
    <text x="244" y="686" fill="#ffffff">-9,</text>
    <text x="274" y="686" fill="#ffffff">15,</text>
    <text x="304" y="686" fill="#ffffff">-3</text>

    <text x="142" y="708" fill="#555">&#160;</text>

    <!-- .string -->
    <text x="142" y="730" fill="#e23614">.string</text>
    <text x="215" y="730" fill="#a8d8a8"> "hello"</text>
  </g>

  <!-- Cursor blink -->
  <rect x="142" y="752" width="8" height="15" fill="#e23614" opacity="0.8"/>

  <!-- Middle panel — symbol table -->
  <rect x="660" y="80" width="560" height="440" rx="4" fill="url(#panelGrad)" stroke="#1e1e1e" stroke-width="1"/>
  <rect x="660" y="80" width="560" height="36" rx="4" fill="#181818"/>
  <rect x="660" y="104" width="560" height="12" fill="#181818"/>
  <text x="940" y="102" text-anchor="middle" font-size="11" fill="#555" letter-spacing="0.1em">SYMBOL TABLE — PASS 1</text>

